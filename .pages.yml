settings:
  site:
    url: https://astro-paper.pages.dev
    preview:
      defaultOpen: true
media:
  input: public
  output: /
content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    site:
      path: /posts/{{slug}}
    view:
      fields: [title, draft, date]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Modified Date, type: date }
      - name: title
        label: Title
        type: string
        required: true
        preview:
          - { target: "#post-title", bind: text }
          - { target: "meta[property='og:title']", bind: content }
      - { name: ogImage, label: OG Image, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - name: tags
        label: Tags
        type: string
        list: true
        preview:
          target: ".tag-{n}"
          bind: text
      - name: description
        label: Description
        type: string
        preview:
          - { target: "meta[name='description']", bind: content }
          - { target: "meta[property='og:description']", bind: content }
      - name: body
        label: Body
        type: rich-text
        preview:
          target: "#post-body"
          bind: html
  - name: about
    label: About page
    type: file
    path: src/pages/about.md
    site:
      path: /about
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - name: title
        label: Title
        type: string
        preview:
          target: "#about-title"
          bind: text
      - name: body
        label: Body
        type: rich-text
        options: { input: public/assets, output: /assets }
        preview:
          target: "#about-body"
          bind: html
